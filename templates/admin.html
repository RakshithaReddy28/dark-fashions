{% extends "base.html" %}
{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-cog"></i> Admin Panel</h1>
        <p>Manage products, prices & images</p>
        <a href="{{ url_for('admin_logout') }}" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <a href="{{ url_for('admin_add') }}" class="btn btn-primary" style="margin-bottom:20px;color:#000!important"><i class="fas fa-plus"></i> Add New Product</a>
    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price (₹)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td><img src="{{ p.image_url }}" alt="{{ p.name }}" class="admin-thumb"></td>
                    <td>{{ p.name }}</td>
                    <td><span class="product-category" style="position:static">{{ p.category }}</span></td>
                    <td>₹{{ "%.0f"|format(p.price) }}</td>
                    <td><a href="{{ url_for('admin_edit', product_id=p.id) }}" class="btn btn-primary btn-sm"><i class="fas fa-edit"></i> Edit</a> <a href="{{ url_for('admin_delete', product_id=p.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('Delete this product?')"><i class="fas fa-trash"></i></a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<style>
.admin-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
.admin-header h1 { font-size: 1.8rem; color: #fff; margin: 0; }
.admin-header h1 i { color: #D4AF37; }
.admin-header p { color: #666; margin: 0; flex: 1; }
.admin-table-wrap { overflow-x: auto; }
.admin-table { width: 100%; border-collapse: collapse; background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
.admin-table th { background: #1a1a1a; color: #D4AF37; padding: 14px 16px; text-align: left; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
.admin-table td { padding: 12px 16px; border-top: 1px solid #222; color: #ccc; font-size: 0.9rem; vertical-align: middle; }
.admin-table tr:hover td { background: #1a1a1a; }
.admin-thumb { width: 50px; height: 65px; object-fit: cover; border-radius: 4px; background: #222; }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; color: #000 !important; }
</style>
{% endblock %}
