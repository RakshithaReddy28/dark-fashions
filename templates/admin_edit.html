{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width:550px">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Dark Fashions" class="auth-logo" style="height:40px">
            <h1>Edit Product</h1>
            <p>{{ product.name }}</p>
        </div>
        <form method="POST" enctype="multipart/form-data" class="auth-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ product.name }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" required>{{ product.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" name="price" value="{{ "%.0f"|format(product.price) }}" step="1" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" name="category" value="{{ product.category }}" required>
            </div>
            <div class="form-group">
                <label>Current Image</label><br>
                <img src="{{ product.image_url }}" alt="{{ product.name }}" style="width:100px;height:130px;object-fit:cover;border-radius:6px;margin-bottom:8px;background:#222">
            </div>
            <div class="form-group">
                <label>Upload New Image (leave empty to keep current)</label>
                <input type="file" name="image" accept="image/*">
            </div>
            <div style="display:flex;gap:10px">
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Save</button>
                <a href="{{ url_for('admin') }}" class="btn btn-block" style="background:#222;color:#aaa;text-align:center;padding:12px;border-radius:8px;text-decoration:none">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
